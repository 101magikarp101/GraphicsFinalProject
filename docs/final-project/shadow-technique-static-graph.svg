<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460">
  <rect width="920" height="460" fill="#0f172a"/>
  <text x="42" y="36" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Shadow Technique Static Cost Comparison</text>
  <text x="42" y="60" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="12">Runtime GPU timings are generated by scripts/capture-shadow-benchmarks.mjs; this graph shows implementation-level costs.</text>

  <g font-family="Arial, sans-serif">
    <text x="74" y="104" fill="#e2e8f0" font-size="14" font-weight="700">GPU passes per frame</text>
    <line x1="74" y1="310" x2="410" y2="310" stroke="#64748b"/>
    <line x1="74" y1="130" x2="74" y2="310" stroke="#64748b"/>
    <rect x="106" y="250" width="54" height="60" fill="#60a5fa"/>
    <rect x="206" y="190" width="54" height="120" fill="#f59e0b"/>
    <rect x="306" y="130" width="54" height="180" fill="#a78bfa"/>
    <text x="133" y="244" fill="#e2e8f0" font-size="12" text-anchor="middle">1</text>
    <text x="233" y="184" fill="#e2e8f0" font-size="12" text-anchor="middle">2</text>
    <text x="333" y="124" fill="#e2e8f0" font-size="12" text-anchor="middle">3</text>
    <text x="133" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">AO</text>
    <text x="233" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">Map</text>
    <text x="333" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">Volume</text>

    <text x="510" y="104" fill="#e2e8f0" font-size="14" font-weight="700">Extra GPU memory estimate</text>
    <line x1="510" y1="310" x2="846" y2="310" stroke="#64748b"/>
    <line x1="510" y1="130" x2="510" y2="310" stroke="#64748b"/>
    <rect x="542" y="310" width="54" height="0" fill="#60a5fa"/>
    <rect x="642" y="130" width="54" height="180" fill="#f59e0b"/>
    <rect x="742" y="286.4" width="54" height="23.6" fill="#a78bfa"/>
    <text x="569" y="300" fill="#e2e8f0" font-size="12" text-anchor="middle">0 MB</text>
    <text x="669" y="124" fill="#e2e8f0" font-size="12" text-anchor="middle">16 MB</text>
    <text x="769" y="280" fill="#e2e8f0" font-size="12" text-anchor="middle">2.1 MB</text>
    <text x="569" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">AO</text>
    <text x="669" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">Map</text>
    <text x="769" y="330" fill="#e2e8f0" font-size="11" text-anchor="middle">Volume</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">
    <rect x="74" y="376" width="14" height="14" fill="#60a5fa"/>
    <text x="96" y="388">Ambient occlusion: cheapest, stable, no cast shadows.</text>
    <rect x="74" y="398" width="14" height="14" fill="#f59e0b"/>
    <text x="96" y="410">Shadow map: extra depth texture pass, adjustable direct-light attenuation.</text>
    <rect x="74" y="420" width="14" height="14" fill="#a78bfa"/>
    <text x="96" y="432">Shadow volume: z-fail stencil mask plus overlay, strongest hard-edge result.</text>
  </g>
</svg>
